<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MůjStream</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0f;--bg2:#131318;--bg3:#1a1a22;--bg4:#222230;
  --border:#ffffff12;--border2:#ffffff22;
  --text:#e8e8f0;--text2:#9090a8;--text3:#5a5a70;
  --accent:#e63946;--r:8px;--sw:300px;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* TOPBAR */
#topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:10}
#topbar h1{font-size:16px;font-weight:600;white-space:nowrap;flex-shrink:0}
#topbar h1 span{color:var(--accent)}
#sw{flex:1;max-width:320px;position:relative}
#sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.35;pointer-events:none}
#search{width:100%;padding:7px 10px 7px 32px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:13px;font-family:inherit}
#search:focus{outline:none;border-color:var(--border2)}
#search::placeholder{color:var(--text3)}
.gf{display:flex;gap:5px;overflow-x:auto;flex:1;scrollbar-width:none}
.gf::-webkit-scrollbar{display:none}
.gf-btn{padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s}
.gf-btn:hover{border-color:var(--border2);color:var(--text)}
.gf-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* LAYOUT */
#layout{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sidebar{width:var(--sw);min-width:var(--sw);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#ch-count{padding:8px 14px;font-size:11px;color:var(--text3);border-bottom:1px solid var(--border);flex-shrink:0;font-family:'DM Mono',monospace}
#ch-list{overflow-y:auto;flex:1;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
#ch-list::-webkit-scrollbar{width:4px}
#ch-list::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.chi{padding:8px 14px;cursor:pointer;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border);transition:background .1s;position:relative}
.chi:hover{background:var(--bg3)}
.chi.active{background:var(--bg3)}
.chi.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent)}
.chi-num{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;min-width:22px;flex-shrink:0}
.chi-logo{width:34px;height:21px;object-fit:contain;flex-shrink:0;border-radius:2px}
.chi-logo-ph{width:34px;height:21px;flex-shrink:0}
.chi-name{font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}

/* PLAYER */
#pw{position:relative;background:#000;flex:0 0 58%;min-height:0}
video{width:100%;height:100%;display:block;background:#000}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.88);gap:14px;text-align:center;padding:20px}
#overlay.hidden{display:none}
#ov-icon{font-size:28px;opacity:.35}
#ov-title{font-size:18px;font-weight:500}
#ov-sub{font-size:12px;color:var(--text2)}
.spin{width:34px;height:34px;border:2px solid var(--bg4);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

#cbar{position:absolute;bottom:0;left:0;right:0;padding:8px 12px;background:linear-gradient(transparent,rgba(0,0,0,.85));display:flex;align-items:center;gap:8px;opacity:0;transition:opacity .2s;pointer-events:none}
#pw:hover #cbar{opacity:1;pointer-events:auto}
#cbar.vis{opacity:1;pointer-events:auto}
#np{font-size:12px;color:rgba(255,255,255,.75);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cbtn{background:rgba(255,255,255,.12);border:none;color:#fff;width:30px;height:30px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:background .15s;flex-shrink:0}
.cbtn:hover{background:rgba(255,255,255,.25)}
#errbar{padding:7px 14px;background:#1a0000;font-size:12px;color:#f55;display:none;border-top:1px solid #400;flex-shrink:0}

/* EPG */
#epg{flex:1;background:var(--bg);border-top:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column;min-height:0}
#epg-hdr{padding:7px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
#epg-label{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.8px;text-transform:uppercase}
#epg-chname{font-size:11px;color:var(--text2);font-style:italic}
#epg-list{overflow-x:auto;overflow-y:hidden;display:flex;flex:1;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
#epg-list::-webkit-scrollbar{height:4px}
#epg-list::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.epgi{min-width:160px;max-width:220px;padding:9px 13px;border-right:1px solid var(--border);flex-shrink:0;position:relative;transition:background .1s;cursor:pointer}
.epgi:hover{background:var(--bg3)}
.epgi.now{background:var(--bg3);border-top:2px solid var(--accent)}
.epgi.past{opacity:.4}
.epgi-time{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:2px}
.epgi.now .epgi-time{color:var(--accent)}
.epgi-title{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.epgi.now .epgi-title{font-weight:600}
.epgi-badge{display:inline-block;font-size:9px;background:var(--accent);color:#fff;padding:1px 5px;border-radius:3px;margin-bottom:3px;font-weight:700;letter-spacing:.5px}
.epgi-prog{position:absolute;bottom:0;left:0;height:2px;background:var(--accent);border-radius:0 1px 1px 0}
/* Catchup indicator */
.epgi.catchup{cursor:pointer}
.epgi.catchup:hover{background:#1a1a00}
.epgi-cu{font-size:9px;color:#aa8;margin-top:2px}
#epg-empty{padding:20px;color:var(--text3);font-size:12px;text-align:center;width:100%;display:flex;align-items:center;justify-content:center}

/* Catchup mode indicator */
#cu-bar{display:none;padding:6px 14px;background:#1a1a00;border-top:1px solid #333;font-size:12px;color:#cc8;align-items:center;gap:8px;flex-shrink:0}
#cu-bar.show{display:flex}
#cu-back{padding:3px 10px;background:#333;color:#eee;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit}
#cu-back:hover{background:#444}

#pw:-webkit-full-screen,#pw:fullscreen{max-height:100vh}
#pw:-webkit-full-screen video,#pw:fullscreen video{height:100vh}
</style>
</head>
<body>

<div id="topbar">
  <h1>▶ Můj<span>Stream</span></h1>
  <div id="sw">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search" type="text" placeholder="Hledej kanál...">
  </div>
  <div class="gf" id="gf"></div>
</div>

<div id="layout">
  <div id="sidebar">
    <div id="ch-count">Načítám...</div>
    <div id="ch-list"></div>
  </div>
  <div id="main">
    <div id="pw">
      <video id="video" autoplay playsinline></video>
      <div id="overlay">
        <div id="ov-icon">📺</div>
        <div id="ov-title">MůjStream</div>
        <div id="ov-sub">Vyber kanál ze seznamu vlevo</div>
      </div>
      <div id="cbar">
        <span id="np"></span>
        <button class="cbtn" id="pbtn" onclick="togglePlay()">⏸</button>
        <button class="cbtn" onclick="toggleFs()" title="Celá obrazovka (F)">⛶</button>
      </div>
    </div>
    <div id="errbar"></div>
    <div id="cu-bar">
      <span id="cu-info">📼 Přehráváš záznam</span>
      <button id="cu-back" onclick="goLive()">▶ Zpět na živé vysílání</button>
    </div>
    <div id="epg">
      <div id="epg-hdr">
        <span id="epg-label">📅 TV Program — klikni na pořad pro přehrání záznamu</span>
        <span id="epg-chname"></span>
      </div>
      <div id="epg-list"><div id="epg-empty">Vyber kanál</div></div>
    </div>
  </div>
</div>

<script>
// ── KONFIGURACE ──────────────────────────────────────────
// Změň na svoji adresu workeru (bez /proxy na konci)
var CF_WORKER = 'https://oneprime.tobias-kubanek.workers.dev'; 
var SERVER_IP = 'http://94.241.90.115:8889';
var EPG_URL   = SERVER_IP + '/epg';
// ─────────────────────────────────────────────────────────

var CH = [
  // ... tvoje pole kanálů (ponechej ho jak je) ...
  {n:'Nova HD',num:1,l:'https://eboxcz-ott-images.ssl.cdn.cra.cz/r480x320n/d8d6974a-3609-47ce-8bd7-657d8c764c99',s:'Nova%20HD'},
  {n:'ČT1 HD',num:2,l:'https://eboxcz-ott-images.ssl.cdn.cra.cz/r480x320n/3cd49c93-164c-4346-aae5-95e2a0660072',s:'%C4%8CT1%20HD'},
  {n:'ČT2 HD',num:3,l:'https://eboxcz-ott-images.ssl.cdn.cra.cz/r480x320n/c44a8578-bbae-410a-a5ff-81c67921fa78',s:'%C4%8CT2%20HD'},
  // ... doplň zbytek svého seznamu ...
];

// Zbytek tvého pole GROUPS ponechej stejný...
var GROUPS = {
  'vše': null,
  'sport': ['Oneplay Sport','Nova Sport','Premier Sport','ČT Sport','Eurosport','CANAL+','Golf','Arena Sport','Sport1','Sport2','Strike','FightBox','Auto motor','Ginx','Gametoon'],
  'základní': ['Nova HD','ČT1 HD','ČT2 HD','Prima HD','Nova CINEMA','Nova Fun','Nova Krimi','Nova Action','Nova Lady','Barrandov','Warner','Televize Seznam','DVTV','Bloomberg'],
  'doku/dětské': ['National Geographic','Animal Planet','Viasat','History','Discovery','ID','Prima Zoom','Spektrum','HGTV','Disney','Nickelodeon','Duck TV','ČT :D','Filmbox','Epic Drama'],
  'zprávy': ['TN Live','ČT 24','CNN Prima News'],
  'hudba': ['Retro Music','Óčko','MTV'],
  'regionální': ['Praha TV','Polar TV','TV Brno','ZAK TV','TV Morava','RTM+','ČT1 SM','ČT1 JM','ČT1 SVC','ČT1 JZC','Krb','Africké'],
};

var activeGroup = 'vše';
var currentCh = null;
var hls = null;
var filtered = [];
var isCatchup = false;

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// HLAVNÍ FUNKCE PRO PROXY
function getProxyUrl(url){
  // Pokud běžíme na HTTPS (např. github.io), MUSÍME použít worker, jinak prohlížeč stream zablokuje
  return CF_WORKER.replace(/\/+$/,'') + '/proxy?url=' + encodeURIComponent(url);
}

// ── GROUP FILTER & RENDER ─────────────────────────────────
function buildGroups(){
  var gf = document.getElementById('gf');
  gf.innerHTML = '';
  Object.keys(GROUPS).forEach(function(g){
    var btn = document.createElement('button');
    btn.className = 'gf-btn' + (g===activeGroup?' active':'');
    btn.textContent = g;
    btn.onclick = function(){
      activeGroup = g;
      document.querySelectorAll('.gf-btn').forEach(function(b){b.classList.remove('active')});
      btn.classList.add('active');
      applyFilter();
    };
    gf.appendChild(btn);
  });
}

function applyFilter(){
  var q = document.getElementById('search').value.toLowerCase();
  var keywords = GROUPS[activeGroup];
  filtered = CH.filter(function(ch){
    var mq = !q || ch.n.toLowerCase().includes(q);
    var mg = !keywords || keywords.some(function(k){ return ch.n.includes(k); });
    return mq && mg;
  });
  renderChannels();
}

document.getElementById('search').addEventListener('input', applyFilter);

function renderChannels(){
  var html = '';
  filtered.forEach(function(ch,i){
    var active = (currentCh && currentCh.n===ch.n) ? ' active':'';
    var logoHtml = ch.l
      ? '<img class="chi-logo" src="'+esc(ch.l)+'" alt="" loading="lazy" onerror="this.style.display=\'none\'">'
      : '<span class="chi-logo-ph"></span>';
    html += '<div class="chi'+active+'" onclick="selectChannel('+i+')">'
          + '<span class="chi-num">'+ch.num+'</span>'
          + logoHtml
          + '<span class="chi-name">'+esc(ch.n)+'</span>'
          + '</div>';
  });
  document.getElementById('ch-list').innerHTML = html || '<div style="padding:16px;color:var(--text3);font-size:12px">Nic nenalezeno</div>';
  document.getElementById('ch-count').textContent = filtered.length + ' kanálů';
}

// ── SELECTION & PLAYBACK ─────────────────────────────────
function selectChannel(idx){
  var ch = filtered[idx];
  if(!ch) return;
  currentCh = ch;
  isCatchup = false;
  document.getElementById('cu-bar').classList.remove('show');
  renderChannels();
  showOverlay(ch.n, 'Načítám stream...', true);
  hideErr();
  document.getElementById('np').textContent = ch.n;
  loadEpg(ch.n);
  
  // Zde generujeme URL pro stream
  var streamUrl = SERVER_IP + '/play/' + ch.s + '.m3u8';
  playHls(streamUrl);
}

function playHls(url){
  var video = document.getElementById('video');
  if(hls){ hls.destroy(); hls = null; }
  video.pause();
  
  // VŽDY použijeme Worker pro .m3u8, abychom vyřešili CORS a Cetin redirecty
  var playUrl = getProxyUrl(url);

  if(Hls.isSupported()){
    hls = new Hls({
      enableWorker: true,
      xhrSetup: function(xhr, url) {
        // Volitelné: pokud by Cetin vyžadoval speciální cookies (většinou netřeba s novým workerem)
      }
    });
    hls.loadSource(playUrl);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, function(){
      video.play().then(function(){ hideOverlay(); showCtrlBar(); }).catch(function(){ hideOverlay(); });
    });
    hls.on(Hls.Events.ERROR, function(e, data){
      if(data.fatal){
        showErr('Chyba streamu (Worker): ' + data.details);
        hideOverlay();
      }
    });
  } else {
    // Pro Safari
    video.src = playUrl;
    video.play().catch(function(e){ showErr('Safari Error: ' + e.message); });
  }
}

// ── EPG ──────────────────────────────────────────────────
var epgCache = null;

function loadEpg(chName){
  document.getElementById('epg-chname').textContent = chName;
  var list = document.getElementById('epg-list');
  list.innerHTML = '<div id="epg-empty">⏳ Načítám program...</div>';

  // EPG načítáme přes Worker, protože port 8889 by jinak neprošel
  var epgFetchUrl = getProxyUrl(EPG_URL);

  if(epgCache){
    renderEpg(epgCache, chName);
  } else {
    fetch(epgFetchUrl)
      .then(r => r.text())
      .then(xml => {
        epgCache = xml;
        renderEpg(xml, chName);
      })
      .catch(e => {
        list.innerHTML = '<div id="epg-empty">EPG selhalo (Port 8889 blokován?)</div>';
      });
  }
}

// ... Zbytek funkcí renderEpg, parseXmlTime, atd. ponechej stejný jako v původním souboru ...
// (Ujisti se, že máš v souboru uzavírací </script> a </body> tags)

window.onload = function(){
  buildGroups();
  applyFilter();
};
</script>
</body>
</html>
