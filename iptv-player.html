<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MůjStream</title>
<script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0f;--bg2:#131318;--bg3:#1a1a22;--bg4:#222230;
  --border:#ffffff12;--border2:#ffffff20;
  --text:#e8e8f0;--text2:#9090a8;--text3:#5a5a70;
  --accent:#e63946;--radius:8px;--sidebar:300px;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
#topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0}
#topbar h1{font-size:17px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;flex-shrink:0}
#topbar h1 span{color:var(--accent)}
#search-wrap{flex:1;max-width:360px;position:relative}
#search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.4}
#search{width:100%;padding:8px 12px 8px 36px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px}
#search:focus{outline:none;border-color:var(--border2)}
#search::placeholder{color:var(--text3)}
.group-filter{display:flex;gap:6px;overflow-x:auto;flex:1;scrollbar-width:none}
.group-filter::-webkit-scrollbar{display:none}
.gf-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s}
.gf-btn:hover{border-color:var(--border2);color:var(--text)}
.gf-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
#layout{display:flex;flex:1;overflow:hidden}
#sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#ch-count{padding:10px 16px;font-size:11px;color:var(--text3);border-bottom:1px solid var(--border);flex-shrink:0;font-family:'DM Mono',monospace}
#channel-list{overflow-y:auto;flex:1;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
#channel-list::-webkit-scrollbar{width:4px}
#channel-list::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.ch-item{padding:9px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);transition:background .1s;position:relative}
.ch-item:hover{background:var(--bg3)}
.ch-item.active{background:var(--bg3)}
.ch-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent)}
.ch-num{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;min-width:24px;flex-shrink:0}
.ch-name{font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ch-logo{width:36px;height:22px;object-fit:contain;flex-shrink:0;border-radius:3px;opacity:.9}
.ch-logo-ph{width:36px;height:22px;flex-shrink:0;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;letter-spacing:-.5px;text-align:center;line-height:1.1}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
#player-wrap{position:relative;background:#000;flex:0 0 60%;min-height:0}
video{width:100%;height:100%;display:block;background:#000}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.85);gap:14px;text-align:center;padding:20px}
#overlay.hidden{display:none}
#ov-icon{font-size:32px;opacity:.4}
#ov-title{font-size:18px;font-weight:500}
#ov-sub{font-size:13px;color:var(--text2)}
.spinner{width:36px;height:36px;border:2px solid var(--bg4);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#controls-bar{position:absolute;bottom:0;left:0;right:0;padding:10px 14px;background:linear-gradient(transparent,rgba(0,0,0,.8));display:flex;align-items:center;gap:10px;opacity:0;transition:opacity .2s;pointer-events:none}
#player-wrap:hover #controls-bar{opacity:1;pointer-events:auto}
#controls-bar.visible{opacity:1;pointer-events:auto}
#now-playing{font-size:12px;color:rgba(255,255,255,.75);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ctrl-btn{background:rgba(255,255,255,.12);border:none;color:#fff;width:32px;height:32px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:background .15s;flex-shrink:0}
.ctrl-btn:hover{background:rgba(255,255,255,.25)}
#err-bar{padding:8px 16px;background:#1a0000;font-size:12px;color:#f55;display:none;border-top:1px solid #400;flex-shrink:0}
#epg-wrap{flex:1;background:var(--bg);border-top:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column;min-height:0}
#epg-header{padding:8px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
#epg-label{font-size:11px;color:var(--text3);font-weight:500;letter-spacing:.8px;text-transform:uppercase}
#epg-ch-name{font-size:12px;color:var(--text2);font-style:italic}
#epg-list{overflow-x:auto;overflow-y:hidden;display:flex;flex:1;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
#epg-list::-webkit-scrollbar{height:4px}
#epg-list::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.epg-item{min-width:160px;max-width:220px;padding:10px 14px;border-right:1px solid var(--border);flex-shrink:0;position:relative;transition:background .1s}
.epg-item:hover{background:var(--bg3)}
.epg-item.epg-now{background:var(--bg3);border-top:2px solid var(--accent)}
.epg-item.epg-past{opacity:.4}
.epg-time{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:3px}
.epg-item.epg-now .epg-time{color:var(--accent)}
.epg-title{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.epg-item.epg-now .epg-title{font-weight:500;color:var(--text)}
.epg-badge{display:inline-block;font-size:9px;background:var(--accent);color:#fff;padding:1px 6px;border-radius:3px;margin-bottom:4px;font-weight:600;letter-spacing:.5px}
.epg-progress{position:absolute;bottom:0;left:0;height:2px;background:var(--accent);border-radius:0 1px 1px 0}
#epg-empty{padding:20px;color:var(--text3);font-size:12px;text-align:center;width:100%;display:flex;align-items:center;justify-content:center}
#player-wrap:-webkit-full-screen,#player-wrap:fullscreen{max-height:100vh}
#player-wrap:-webkit-full-screen video,#player-wrap:fullscreen video{height:100vh}
</style>
</head>
<body>
<div id="topbar">
  <h1>&#9654; M&#367;j<span>Stream</span></h1>
  <div id="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search" type="text" placeholder="Hledej kanál...">
  </div>
  <div class="group-filter" id="group-filter"></div>
</div>
<div id="layout">
  <div id="sidebar">
    <div id="ch-count">Načítám playlist...</div>
    <div id="channel-list"></div>
  </div>
  <div id="main">
    <div id="player-wrap">
      <video id="video" autoplay playsinline></video>
      <div id="overlay">
        <div id="ov-icon">&#128250;</div>
        <div id="ov-title">MůjStream</div>
        <div id="ov-sub">Načítám playlist...</div>
      </div>
      <div id="controls-bar">
        <span id="now-playing"></span>
        <span id="quality-dot" style="font-size:11px;color:rgba(255,255,255,.6);flex-shrink:0;font-family:monospace"></span>
        <button class="ctrl-btn" id="play-btn" onclick="togglePlay()">&#9208;</button>
        <button class="ctrl-btn" onclick="toggleFs()">&#9638;</button>
      </div>
    </div>
    <div id="err-bar"></div>
    <div id="epg-wrap">
      <div id="epg-header">
        <span id="epg-label">&#128197; TV Program</span>
        <span id="epg-ch-name"></span>
      </div>
      <div id="epg-list"><div id="epg-empty">Vyber kanál pro zobrazení programu</div></div>
    </div>
  </div>
</div>
<script>
// ---- Konfigurace ----
var PLAYLIST_URL = 'playlist.m3u';

// ---- Stav ----
var CH = [];
var GROUPS = [];
var EPG_URL = '';
var activeGroup = 'vse';
var currentUrl = null;
var player = null;
var filtered = [];

// ---- Pomocne ----
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function logoInitials(name){
  var clean = name.replace(/\s*(HD|4K|ultra HD|SD)$/i,'').trim();
  var words = clean.split(/\s+/);
  var initials = words.length>=2 ? (words[0][0]+words[1][0]).toUpperCase() : clean.slice(0,2).toUpperCase();
  var colors = ['#c0392b','#2980b9','#27ae60','#8e44ad','#d35400','#16a085','#2c3e50','#b7950b','#1a5276','#784212'];
  var idx = 0;
  for(var i=0;i<name.length;i++) idx=(idx+name.charCodeAt(i))%colors.length;
  return '<span class="ch-logo-ph" style="background:'+colors[idx]+'">'+esc(initials)+'</span>';
}

// ---- Parsovani M3U ----
function parseM3U(text){
  var lines = text.split(/\r?\n/);
  var channels = [];

  var header = lines[0] || '';
  var epgMatch = header.match(/url-tvg="([^"]+)"/);
  if(epgMatch) EPG_URL = epgMatch[1];

  for(var i=0;i<lines.length;i++){
    var line = lines[i].trim();
    if(!line.startsWith('#EXTINF')) continue;

    var name='', logo='', group='ostatni', tvgId='';

    var m = line.match(/tvg-name="([^"]*)"/);
    if(m) name = m[1];
    m = line.match(/tvg-logo="([^"]*)"/);
    if(m) logo = m[1];
    m = line.match(/group-title="([^"]*)"/);
    if(m) group = m[1] || 'ostatni';
    m = line.match(/tvg-id="([^"]*)"/);
    if(m) tvgId = m[1];
    if(!name){
      var comma = line.lastIndexOf(',');
      if(comma>=0) name = line.slice(comma+1).trim();
    }

    var url = '';
    for(var j=i+1;j<lines.length&&j<=i+2;j++){
      var next = lines[j].trim();
      if(next && !next.startsWith('#')){ url=next; break; }
    }

    if(name && url){
      channels.push({t:name, g:group, u:url, l:logo, id:tvgId});
    }
  }

  var orderedGroups = ['vse'];
  channels.forEach(function(ch){
    if(orderedGroups.indexOf(ch.g)<0) orderedGroups.push(ch.g);
  });

  return { channels:channels, groups:orderedGroups };
}

// ---- Nacti playlist ----
function loadPlaylist(){
  document.getElementById('ch-count').textContent = 'Nacitam playlist...';
  document.getElementById('ov-sub').textContent = 'Nacitam playlist...';

  fetch(PLAYLIST_URL)
    .then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status);
      return r.text();
    })
    .then(function(text){
      var result = parseM3U(text);
      CH = result.channels;
      GROUPS = result.groups;
      buildGroupFilter();
      applyFilter();
      document.getElementById('ov-title').textContent = 'M\u016fjStream';
      document.getElementById('ov-sub').textContent = 'Vyber kan\u00e1l ze seznamu vlevo';
    })
    .catch(function(e){
      document.getElementById('ch-count').textContent = 'Chyba nacteni!';
      document.getElementById('ov-sub').textContent = 'Nelze nacist playlist.m3u \u2014 zkontroluj proxy server.';
    });
}

// ---- Skupinovy filtr ----
function buildGroupFilter(){
  var gf = document.getElementById('group-filter');
  gf.innerHTML = '';
  GROUPS.forEach(function(g){
    var btn = document.createElement('button');
    btn.className = 'gf-btn' + (g===activeGroup?' active':'');
    btn.textContent = g === 'vse' ? 'v\u0161e' : g;
    btn.onclick = function(){
      activeGroup = g;
      document.querySelectorAll('.gf-btn').forEach(function(b){b.classList.remove('active');});
      btn.classList.add('active');
      applyFilter();
    };
    gf.appendChild(btn);
  });
}

// ---- Filtrovani & render ----
function applyFilter(){
  var q = document.getElementById('search').value.toLowerCase();
  filtered = CH.filter(function(ch){
    var mq = !q || ch.t.toLowerCase().includes(q);
    var mg = activeGroup==='vse' || ch.g===activeGroup;
    return mq && mg;
  });
  renderChannels();
}

function renderChannels(){
  var html = '';
  filtered.forEach(function(ch,i){
    var active = ch.u===currentUrl?' active':'';
    var logoHtml = ch.l
      ? '<img class="ch-logo" src="'+esc(ch.l)+'" alt="" loading="lazy" onerror="this.outerHTML=logoInitials(\''+esc(ch.t)+'\')">'
      : logoInitials(ch.t);
    html += '<div class="ch-item'+active+'" onclick="playChannel('+i+')">'
          + '<span class="ch-num">'+(i+1)+'</span>'
          + logoHtml
          + '<span class="ch-name">'+esc(ch.t)+'</span>'
          + '</div>';
  });
  document.getElementById('channel-list').innerHTML = html || '<div style="padding:20px;color:var(--text3);font-size:13px">Nic nenalezeno</div>';
  document.getElementById('ch-count').textContent = filtered.length+' kan\u00e1l\u016f';
}

// ---- Prehravani ----
function playChannel(idx){
  var ch = filtered[idx];
  if(!ch) return;
  currentUrl = ch.u;
  showOverlay(ch.t,'Na\u010d\u00edt\u00e1m stream...',true);
  hideErr();
  document.getElementById('now-playing').textContent = ch.t;
  renderChannels();
  loadEpg(ch.t, ch.id);
  doPlay(ch.u);
}

var _playPending = false;
function doPlay(url){
  if(_playPending) return;
  _playPending = true;
  var video = document.getElementById('video');

  var old = player;
  player = null;
  var cleanup = function(){
    if(old){
      try{old.unload();}catch(e){}
      try{old.detachMediaElement();}catch(e){}
      try{old.destroy();}catch(e){}
    }
    video.pause();
    video.removeAttribute('src');
    video.load();
    startNew();
  };
  if(old){ video.pause(); setTimeout(cleanup,150); }
  else { video.pause(); video.removeAttribute('src'); video.load(); startNew(); }

  function startNew(){
    _playPending = false;
    // VOD/serialy: url konci .mp4 apod. NEBO kanal patri do skupiny vod/series
    var currentCh = CH.find(function(c){ return c.u===url; });
    var isVodGroup = currentCh && /^(vod|series|vod-|serie)/i.test(currentCh.g);
    var isDirectVideo = isVodGroup || url.match(/\.(mp4|mkv|webm|avi)(\?|$)/i);
    if(isDirectVideo){
      // Nejdriv zkus primy fetch bez proxy (nektera VOD servery maji CORS)
      // Pokud selze, pouzij proxy
      // Cloudflare Worker proxy pro VOD (nastav svou Worker URL)
      var CF_PROXY = 'https://oneprime.tobias-kubanek.workers.dev';
      var proxyUrl = CF_PROXY + '/proxy?url=' + encodeURIComponent(url);
      video.src = proxyUrl;
      video.load();
      video.play().then(function(){
        hideOverlay(); showCtrlBar();
      }).catch(function(e){
        if(e&&e.name==='AbortError') return;
        hideOverlay(); showErr('Nelze p\u0159ehr\u00e1t film. Zkontroluj \u017ee proxy b\u011b\u017e\u00ed (spust_server.bat).');
      });
      video.onerror = function(){ hideOverlay(); showErr('Chyba na\u010d\u00edt\u00e1n\u00ed videa p\u0159es proxy.'); };
      return;
    }
    if(!mpegts.getFeatureList().mseLivePlayback){
      hideOverlay(); showErr('Prohl\u00ed\u017ee\u010d nepodporuje MPEG-TS.'); return;
    }
    player = mpegts.createPlayer({type:'mpegts',url:url,isLive:true},{
      enableWorker:true,
      lazyLoadMaxDuration:3,
      lazyLoadRecoverDuration:1,
      seekType:'range',
      liveBufferLatencyChasing:false,
      liveBufferLatencyMaxLatency:12,
      liveBufferLatencyMinRemain:4,
      accurateSeek:false,
      stashInitialSize: 512,
    });
    // Potlac MP4Remuxer "Dropping audio frame" varovani
    var origWarn = console.warn;
    console.warn = function(msg){
      if(typeof msg==='string' && msg.indexOf('Dropping')>=0) return;
      origWarn.apply(console, arguments);
    };
    // Sleduj buffer a zobraz kvalitu signalu
    var _qualTimer = setInterval(function(){
      if(player !== p){ clearInterval(_qualTimer); return; }
      try{
        var stat = player.statisticsInfo;
        if(!stat) return;
        var speed = stat.speed || 0; // kB/s
        var buf = video.buffered.length ? (video.buffered.end(0) - video.currentTime).toFixed(1) : '?';
        var kb = Math.round(speed);
        var dot = kb > 800 ? '🟢' : kb > 300 ? '🟡' : '🔴';
        document.getElementById('quality-dot').textContent = dot + ' ' + kb + ' kB/s · buf ' + buf + 's';
      }catch(e){}
    }, 2000);
    player.attachMediaElement(video);
    player.load();
    var p = player;
    video.play().then(function(){
      if(player===p){ hideOverlay(); showCtrlBar(); }
    }).catch(function(e){
      if(e&&e.name==='AbortError') return;
      if(player===p){ hideOverlay(); showErr('Nelze p\u0159ehr\u00e1t: '+(e&&e.message?e.message:'chyba')); }
    });
    player.on(mpegts.Events.ERROR,function(et){
      if(player===p){ hideOverlay(); showErr('Stream chyba: '+et); }
    });
  }
}

// ---- Ovladani ----
function togglePlay(){
  var v=document.getElementById('video'),b=document.getElementById('play-btn');
  if(!v.src&&!v.currentSrc) return;
  if(v.paused){v.play();b.innerHTML='&#9208;';}
  else{v.pause();b.innerHTML='&#9654;';}
}
document.getElementById('video').addEventListener('pause',function(){document.getElementById('play-btn').innerHTML='&#9654;';});
document.getElementById('video').addEventListener('play',function(){document.getElementById('play-btn').innerHTML='&#9208;';});
function toggleFs(){
  var wrap=document.getElementById('player-wrap');
  var isFs=!!(document.fullscreenElement||document.webkitFullscreenElement);
  if(!isFs)(wrap.requestFullscreen||wrap.webkitRequestFullscreen||function(){}).call(wrap);
  else(document.exitFullscreen||document.webkitExitFullscreen||function(){}).call(document);
}
document.getElementById('player-wrap').addEventListener('click',function(e){
  if(e.target.closest('#controls-bar')||e.target.closest('#overlay')) return;
  togglePlay();
});
document.addEventListener('keydown',function(e){
  if(e.key==='f'||e.key==='F'){e.preventDefault();toggleFs();}
  if(e.key===' '||e.key==='k'){e.preventDefault();togglePlay();}
  if(e.key==='ArrowDown'){var c=filtered.findIndex(function(x){return x.u===currentUrl;});if(c<filtered.length-1)playChannel(c+1);}
  if(e.key==='ArrowUp'){var c2=filtered.findIndex(function(x){return x.u===currentUrl;});if(c2>0)playChannel(c2-1);}
});
function showCtrlBar(){
  var cb=document.getElementById('controls-bar');
  cb.classList.add('visible');
  setTimeout(function(){cb.classList.remove('visible');},3000);
}

// ---- EPG ----
var _epgCache=null, _epgLoading=false, _epgQueue=[];

function loadEpg(title,tvgId){
  document.getElementById('epg-ch-name').textContent=title;
  document.getElementById('epg-list').innerHTML='<div id="epg-empty">Na\u010d\u00edt\u00e1m program...</div>';
  if(_epgCache){ parseEpg(_epgCache,title,tvgId); return; }
  _epgQueue.push({title:title,tvgId:tvgId});
  if(_epgLoading) return;
  _epgLoading=true;
  var epgUrl=EPG_URL||'http://193.109.193.16:4300/xml/sejviczthoms/SejviCZthoms1122@/epg.xml';
  fetch(epgUrl).then(function(r){return r.text();}).then(function(xml){
    _epgCache=xml; _epgLoading=false;
    var last=_epgQueue[_epgQueue.length-1]; _epgQueue=[];
    parseEpg(xml,last.title,last.tvgId);
  }).catch(function(e){
    _epgLoading=false; _epgQueue=[];
    document.getElementById('epg-list').innerHTML='<div id="epg-empty">EPG nedostupn\u00e9</div>';
  });
}

function parseEpg(xmlStr,channelTitle,tvgId){
  var parser=new DOMParser();
  var doc=parser.parseFromString(xmlStr,'text/xml');
  var programmes=Array.from(doc.querySelectorAll('programme'));
  var now=Math.floor(Date.now()/1000);
  var titleLow=channelTitle.toLowerCase().replace(/ hd$/,'').replace(/ sd$/,'').replace(/[^a-z0-9áčďéěíňóřšťúůýž ]/g,'').trim();
  var words=titleLow.split(' ').filter(function(w){return w.length>2;});
  var matches=[];
  if(tvgId) matches=programmes.filter(function(p){return (p.getAttribute('channel')||'').toLowerCase()===tvgId.toLowerCase();});
  if(!matches.length&&words.length) programmes.forEach(function(p){var ch=(p.getAttribute('channel')||'').toLowerCase();if(words.every(function(w){return ch.includes(w);}))matches.push(p);});
  if(!matches.length&&words.length){var kw=words[0];matches=programmes.filter(function(p){return (p.getAttribute('channel')||'').toLowerCase().includes(kw);});}
  if(!matches.length){document.getElementById('epg-list').innerHTML='<div id="epg-empty">\u017d\u00e1dn\u00fd program pro tento kan\u00e1l</div>';return;}
  function pt(t){if(!t)return 0;var m=t.match(/^(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})(\d{2})/);return m?Math.floor(new Date(m[1]+'-'+m[2]+'-'+m[3]+'T'+m[4]+':'+m[5]+':'+m[6]+'Z').getTime()/1000):0;}
  function ft(ts){var d=new Date(ts*1000);return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);}
  var html='',si=-1;
  matches.slice(0,40).forEach(function(p,i){
    var s=pt(p.getAttribute('start')),e=pt(p.getAttribute('stop'));
    var t=(p.querySelector('title')||{}).textContent||'';
    var isN=(now>=s&&now<e),isP=(now>=e);
    var cls='epg-item'+(isN?' epg-now':'')+(isP?' epg-past':'');
    if(isN)si=i;
    var pr='';
    if(isN&&e>s){var pct=Math.round(((now-s)/(e-s))*100);pr='<div class="epg-progress" style="width:'+pct+'%"></div>';}
    var badge=isN?'<div class="epg-badge">TERAZ</div>':'';
    html+='<div class="'+cls+'" id="ei-'+i+'">'+badge+'<div class="epg-time">'+ft(s)+'&ndash;'+ft(e)+'</div><div class="epg-title">'+esc(t)+'</div>'+pr+'</div>';
  });
  document.getElementById('epg-list').innerHTML=html||'<div id="epg-empty">\u017d\u00e1dn\u00e9 programy</div>';
  if(si>=0)setTimeout(function(){var el=document.getElementById('ei-'+si);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});},150);
}

// ---- UI helpers ----
function showOverlay(title,sub,spin){
  var o=document.getElementById('overlay');o.classList.remove('hidden');
  document.getElementById('ov-icon').style.display=spin?'none':'block';
  document.getElementById('ov-title').textContent=title;
  document.getElementById('ov-sub').textContent=sub;
  var s=o.querySelector('.spinner');
  if(spin&&!s){var d=document.createElement('div');d.className='spinner';o.insertBefore(d,o.firstChild);}
  if(!spin&&s)s.remove();
}
function hideOverlay(){document.getElementById('overlay').classList.add('hidden');}
function showErr(m){var b=document.getElementById('err-bar');b.textContent=m;b.style.display='block';}
function hideErr(){document.getElementById('err-bar').style.display='none';}

// ---- Start ----
document.getElementById('search').addEventListener('input',applyFilter);
loadPlaylist();
</script>
