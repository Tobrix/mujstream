<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MůjStream</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
<style>
/* ... (Ponechal jsem tvůj původní CSS styl, je skvělý) ... */
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0f;--bg2:#131318;--bg3:#1a1a22;--bg4:#222230;
  --border:#ffffff12;--border2:#ffffff22;
  --text:#e8e8f0;--text2:#9090a8;--text3:#5a5a70;
  --accent:#e63946;--r:8px;--sw:300px;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
#topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:10}
#topbar h1{font-size:16px;font-weight:600;white-space:nowrap;flex-shrink:0}
#topbar h1 span{color:var(--accent)}
#sw{flex:1;max-width:320px;position:relative}
#sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.35;pointer-events:none}
#search{width:100%;padding:7px 10px 7px 32px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:13px;font-family:inherit}
#search:focus{outline:none;border-color:var(--border2)}
#search::placeholder{color:var(--text3)}
.gf{display:flex;gap:5px;overflow-x:auto;flex:1;scrollbar-width:none}
.gf::-webkit-scrollbar{display:none}
.gf-btn{padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s}
.gf-btn:hover{border-color:var(--border2);color:var(--text)}
.gf-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
#layout{display:flex;flex:1;overflow:hidden}
#sidebar{width:var(--sw);min-width:var(--sw);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#ch-count{padding:8px 14px;font-size:11px;color:var(--text3);border-bottom:1px solid var(--border);flex-shrink:0;font-family:'DM Mono',monospace}
#ch-list{overflow-y:auto;flex:1;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
.chi{padding:8px 14px;cursor:pointer;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border);transition:background .1s;position:relative}
.chi:hover{background:var(--bg3)}
.chi.active{background:var(--bg3)}
.chi.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent)}
.chi-num{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;min-width:22px;flex-shrink:0}
.chi-logo{width:34px;height:21px;object-fit:contain;flex-shrink:0;border-radius:2px}
.chi-name{font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
#pw{position:relative;background:#000;flex:0 0 58%;min-height:0}
video{width:100%;height:100%;display:block;background:#000}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.88);gap:14px;text-align:center;padding:20px}
#overlay.hidden{display:none}
.spin{width:34px;height:34px;border:2px solid var(--bg4);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#cbar{position:absolute;bottom:0;left:0;right:0;padding:8px 12px;background:linear-gradient(transparent,rgba(0,0,0,.85));display:flex;align-items:center;gap:8px;opacity:0;transition:opacity .2s;pointer-events:none}
#pw:hover #cbar{opacity:1;pointer-events:auto}
.cbtn{background:rgba(255,255,255,.12);border:none;color:#fff;width:30px;height:30px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px}
#errbar{padding:7px 14px;background:#1a0000;font-size:12px;color:#f55;display:none;border-top:1px solid #400}
#epg{flex:1;background:var(--bg);border-top:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column;min-height:0}
#epg-hdr{padding:7px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
#epg-label{font-size:10px;color:var(--text3);text-transform:uppercase}
#epg-list{overflow-x:auto;display:flex;flex:1;scrollbar-width:thin}
.epgi{min-width:160px;max-width:220px;padding:9px 13px;border-right:1px solid var(--border);flex-shrink:0}
#epg-empty{padding:20px;color:var(--text3);font-size:12px;text-align:center;width:100%}
</style>
</head>
<body>

<div id="topbar">
  <h1>▶ Můj<span>Stream</span></h1>
  <div id="sw">
    <input id="search" type="text" placeholder="Hledej kanál...">
  </div>
  <div class="gf" id="gf"></div>
</div>

<div id="layout">
  <div id="sidebar">
    <div id="ch-count">Načítám...</div>
    <div id="ch-list"></div>
  </div>
  <div id="main">
    <div id="pw">
      <video id="video" autoplay playsinline controls></video>
      <div id="overlay">
        <div id="ov-icon">📺</div>
        <div id="ov-title">MůjStream</div>
        <div id="ov-sub">Vyber kanál vlevo</div>
      </div>
    </div>
    <div id="errbar"></div>
    <div id="epg">
      <div id="epg-hdr">
        <span id="epg-label">📅 TV Program</span>
        <span id="epg-chname"></span>
      </div>
      <div id="epg-list"><div id="epg-empty">Vyber kanál</div></div>
    </div>
  </div>
</div>

<script>
// ── KONFIGURACE ──────────────────────────────────────────
const CF_WORKER = 'https://oneprime.tobias-kubanek.workers.dev';
const SERVER_IP = 'http://94.241.90.115:8889';
// ─────────────────────────────────────────────────────────

// Pomocná funkce pro obalení adresy workerem (pro fix CORS a Port 8889)
function getProxyUrl(target) {
    return `${CF_WORKER}/proxy?url=${encodeURIComponent(target)}`;
}

// Zde máš svůj seznam kanálů (zkráceno pro ukázku, ponechej si svůj dlouhý)
var CH = [
  {n:'Nova HD',num:1,l:'https://eboxcz-ott-images.ssl.cdn.cra.cz/r480x320n/d8d6974a-3609-47ce-8bd7-657d8c764c99',s:'Nova%20HD'},
  {n:'ČT1 HD',num:2,l:'https://eboxcz-ott-images.ssl.cdn.cra.cz/r480x320n/3cd49c93-164c-4346-aae5-95e2a0660072',s:'%C4%8CT1%20HD'},
  {n:'ČT2 HD',num:3,l:'https://eboxcz-ott-images.ssl.cdn.cra.cz/r480x320n/c44a8578-bbae-410a-a5ff-81c67921fa78',s:'%C4%8CT2%20HD'},
  {n:'Prima HD',num:4,l:'https://eboxcz-ott-images.ssl.cdn.cra.cz/r480x320n/842356b8-72a9-4cf4-8fe2-7d608021585e',s:'Prima%20HD'}
  // ... sem si vlož zbytek kanálů co jsi měl ...
];

var currentCh = null;
var hls = null;

function renderChannels() {
    const list = document.getElementById('ch-list');
    list.innerHTML = CH.map((ch, idx) => `
        <div class="chi" onclick="selectChannel(${idx})">
            <span class="chi-num">${ch.num}</span>
            <img class="chi-logo" src="${ch.l}" onerror="this.style.opacity=0">
            <span class="chi-name">${ch.n}</span>
        </div>
    `).join('');
    document.getElementById('ch-count').textContent = CH.length + ' kanálů';
}

function selectChannel(idx) {
    const ch = CH[idx];
    currentCh = ch;
    document.getElementById('epg-chname').textContent = ch.n;
    document.getElementById('overlay').classList.add('hidden');
    
    const streamUrl = `${SERVER_IP}/play/${ch.s}.m3u8`;
    playHls(streamUrl);
    loadEpg(ch.n);
}

function playHls(url) {
    const video = document.getElementById('video');
    const proxiedUrl = getProxyUrl(url);

    if (hls) hls.destroy();

    if (Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(proxiedUrl);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        hls.on(Hls.Events.ERROR, (e, data) => {
            if (data.fatal) {
                document.getElementById('errbar').style.display = 'block';
                document.getElementById('errbar').textContent = 'Chyba streamu: ' + data.details;
            }
        });
    } else {
        video.src = proxiedUrl;
    }
}

function loadEpg(chName) {
    const epgList = document.getElementById('epg-list');
    epgList.innerHTML = '⏳ Načítám...';
    
    // EPG musíme tahat přes proxy, port 8889 by jinak neprošel
    fetch(getProxyUrl(`${SERVER_IP}/epg`))
        .then(r => r.text())
        .then(xml => {
            epgList.innerHTML = '<div id="epg-empty">Program načten (zpracování...)</div>';
            // Tady by následoval tvůj kód pro renderEpg(xml, chName)
        })
        .catch(() => {
            epgList.innerHTML = '<div id="epg-empty">EPG momentálně nedostupné</div>';
        });
}

window.onload = renderChannels;
</script>
</body>
</html>
